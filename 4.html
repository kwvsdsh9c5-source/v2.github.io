<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, minimum-scale=0.5">
  <title>角色数值面板 · 固定时刻增长</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #f0f2f5;
      font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 16px 12px;
      display: flex;
      justify-content: center;
    }
    .app-container {
      max-width: 1400px;
      width: 100%;
    }

    /* 认证卡片 */
    .auth-card {
      background: white;
      border-radius: 20px;
      padding: 16px 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .user-welcome {
      font-weight: 600;
      font-size: 0.95rem;
      color: #1e293b;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .auth-form {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .auth-form input {
      border: 1px solid #dce3eb;
      border-radius: 20px;
      padding: 10px 14px;
      font-size: 0.85rem;
      background: #f8fafc;
      outline: none;
      min-width: 120px;
    }
    button {
      background: #1e293b;
      border: none;
      color: white;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 22px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid #1e293b;
      white-space: nowrap;
    }
    button:hover { background: #0f172a; transform: translateY(-1px); }
    .btn-outline { background: white; color: #1e293b; border: 1px solid #cbd5e1; }
    .btn-outline:hover { background: #f8fafc; }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #1e293b;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    h1 span {
      background: #eef2ff;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      color: #4f46e5;
    }

    /* 添加角色区域 */
    .add-character-card {
      background: white;
      border-radius: 20px;
      padding: 16px 18px;
      margin-bottom: 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 10px;
    }
    .char-input-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 2 1 140px;
    }
    .char-input-group label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #64748b;
      letter-spacing: 0.3px;
      margin-left: 4px;
    }
    .char-input-group input {
      border: 1px solid #dce3eb;
      border-radius: 18px;
      padding: 10px 12px;
      font-size: 0.85rem;
      background: #f8fafc;
      outline: none;
    }
    .value-input-row {
      display: flex;
      gap: 6px;
      flex: 3 1 320px;
      flex-wrap: wrap;
    }
    .mini-input {
      flex: 1 1 65px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .mini-input label {
      font-size: 0.58rem;
      font-weight: 700;
      color: #94a3b8;
      margin-left: 2px;
    }
    .mini-input input {
      border: 1px solid #dce3eb;
      border-radius: 14px;
      padding: 8px 6px;
      font-size: 0.78rem;
      background: white;
      outline: none;
      text-align: center;
    }

    /* 底部时间表 */
    .schedule-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 0.68rem;
      color: #64748b;
      margin-top: 10px;
      background: white;
      border-radius: 14px;
      padding: 10px 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.03);
    }
    .schedule-item {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #f8fafc;
      padding: 4px 10px;
      border-radius: 12px;
    }

    /* 角色卡片网格 */
    .characters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
      margin-top: 6px;
    }
    @media (max-width: 750px) {
      .characters-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 6px;
      }
      .character-card {
        padding: 6px 5px 8px;
        gap: 4px;
        border-radius: 14px;
      }
      .char-name-display {
        font-size: 0.62rem !important;
        padding: 3px 6px !important;
      }
      .values-grid {
        gap: 4px !important;
      }
      .value-block {
        padding: 4px 3px !important;
        border-radius: 10px !important;
        gap: 1px !important;
      }
      .value-label {
        font-size: 0.45rem !important;
      }
      .value-number {
        font-size: 0.85rem !important;
      }
      .edit-value-input {
        font-size: 0.5rem !important;
        padding: 3px 2px !important;
      }
      .apply-edit-btn {
        font-size: 0.45rem !important;
        padding: 2px 6px !important;
      }
      .growth-info {
        font-size: 0.42rem !important;
      }
      .note-field input {
        font-size: 0.5rem !important;
        padding: 4px 6px !important;
      }
      .card-footer {
        font-size: 0.45rem !important;
      }
      .drag-handle {
        font-size: 0.6rem !important;
        padding: 2px 4px !important;
      }
      .remove-char-btn {
        font-size: 0.7rem !important;
      }
    }

    .character-card {
      background: white;
      border-radius: 18px;
      padding: 12px 12px 12px;
      box-shadow: 0 3px 14px rgba(0,0,0,0.04);
      border: 1px solid #edf2f7;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: all 0.2s;
      cursor: default;
    }
    .character-card.dragging {
      opacity: 0.5;
      transform: scale(0.95);
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
      border: 2px dashed #3b82f6;
    }
    .character-card.drag-over {
      border: 2px solid #3b82f6;
      box-shadow: 0 0 0 4px rgba(59,130,246,0.15);
      transform: scale(1.02);
    }

    .card-top-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .drag-handle {
      cursor: grab;
      color: #94a3b8;
      font-size: 0.9rem;
      padding: 3px 5px;
      border-radius: 6px;
      user-select: none;
      flex-shrink: 0;
      transition: 0.15s;
      line-height: 1;
    }
    .drag-handle:hover { color: #3b82f6; background: #eff6ff; }
    .drag-handle:active { cursor: grabbing; }
    .char-name-display {
      font-size: 0.9rem;
      font-weight: 600;
      color: #0f172a;
      background: #f1f5f9;
      padding: 4px 10px;
      border-radius: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .remove-char-btn {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 3px 7px;
      border-radius: 12px;
      flex-shrink: 0;
    }
    .remove-char-btn:hover { color: #ef4444; background: #fef2f2; }

    .values-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .value-block {
      background: #f8fafc;
      border-radius: 14px;
      padding: 8px 6px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 2px;
      transition: all 0.2s;
      position: relative;
    }
    .value-block.white { background: #f8fafc; border: 1px solid #e2e8f0; }
    .value-block.blue { background: #f0f4ff; border: 1px solid #dbeafe; }
    .value-block.conquest { background: #fffbeb; border: 1px solid #fde68a; }
    .value-block.transcend { background: #f5f3ff; border: 1px solid #ddd6fe; }

    .value-block.maxed-white {
      background: #fff7ed; border: 2px solid #f97316;
      box-shadow: 0 0 10px rgba(249,115,22,0.3);
    }
    .value-block.maxed-conquest {
      background: #fffbeb; border: 2px solid #f59e0b;
      box-shadow: 0 0 10px rgba(245,158,11,0.3);
    }
    .value-block.maxed-transcend {
      background: #f5f3ff; border: 2px solid #8b5cf6;
      box-shadow: 0 0 10px rgba(139,92,246,0.3);
    }

    .value-label {
      font-size: 0.58rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #64748b;
      letter-spacing: 0.3px;
    }
    .value-number {
      font-size: 1.3rem;
      font-weight: 600;
      color: #0f172a;
      line-height: 1.2;
    }
    .edit-value-input {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 4px 5px;
      font-size: 0.65rem;
      text-align: center;
      background: white;
      outline: none;
      margin-top: 1px;
    }
    .edit-value-input:focus { border-color: #3b82f6; }
    .apply-edit-btn {
      background: #475569;
      color: white;
      border: none;
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 0.55rem;
      cursor: pointer;
      margin-top: 2px;
      align-self: center;
      transition: 0.15s;
    }
    .apply-edit-btn:hover { background: #1e293b; }
    .growth-info {
      font-size: 0.5rem;
      color: #64748b;
      margin-top: 1px;
      font-weight: 500;
    }
    .note-field input {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 6px 8px;
      font-size: 0.65rem;
      background: #fafafa;
      outline: none;
    }
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.6rem;
      color: #94a3b8;
    }
    .reset-timer-small {
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      padding: 2px 8px;
      font-size: 0.55rem;
      border-radius: 10px;
      cursor: pointer;
      color: #475569;
    }
    .reset-timer-small:hover { background: #e2e8f0; }
    .empty-message {
      color: #94a3b8;
      padding: 24px;
      text-align: center;
      background: white;
      border-radius: 18px;
      font-style: italic;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div id="authArea" class="auth-card"></div>

  <div id="mainContent" style="display: none;">
    <h1>🎭 角色数值面板 <span>拖拽排序 · 固定时刻增长</span></h1>

    <div class="add-character-card">
      <div class="char-input-group">
        <label>🧑 角色名字</label>
        <input type="text" id="newCharName" placeholder="输入名字..." autocomplete="off">
      </div>
      <div class="value-input-row">
        <div class="mini-input"><label>⬜白</label><input type="number" id="newWhite" value="0" step="any" min="0"></div>
        <div class="mini-input"><label>🔵蓝</label><input type="number" id="newBlue" value="0" step="any" min="0"></div>
        <div class="mini-input"><label>⚔️征服</label><input type="number" id="newConquest" value="0" step="1" min="0"></div>
        <div class="mini-input"><label>✨超越</label><input type="number" id="newTranscend" value="0" step="1" min="0"></div>
      </div>
      <button id="addCharacterBtn">＋ 添加</button>
    </div>

    <div style="margin-bottom:6px;font-size:0.7rem;color:#94a3b8;display:flex;align-items:center;gap:4px;">
      <span>⋮⋮</span> 拖拽左侧手柄可调整角色顺序
    </div>
    <div id="charactersContainer" class="characters-grid"></div>
    <div id="emptyPlaceholder" class="empty-message" style="display:none;">✨ 还没有角色，在上方输入名字和数值开始登记吧。</div>

    <div class="schedule-bar">
      <div class="schedule-item">⬜ 白色 02/05/08/11/14/17/20/23 <strong>+15</strong> (840满)</div>
      <div class="schedule-item">⚔️ 征服 05/13/21 <strong>+1</strong> (21满)</div>
      <div class="schedule-item">✨ 超越 05/17 <strong>+1</strong> (14满)</div>
    </div>
  </div>
</div>

<script>
  (function() {
    const USERS_STORAGE_KEY = 'app_users_db_v5';
    const CURRENT_USER_KEY = 'current_user';

    const WHITE_HOURS = [2,5,8,11,14,17,20,23];
    const CONQUEST_HOURS = [5,13,21];
    const TRANSCEND_HOURS = [5,17];
    const WHITE_MAX = 840;
    const CONQUEST_MAX = 21;
    const TRANSCEND_MAX = 14;

    // 用户系统
    function getAllUsers() { try { return JSON.parse(localStorage.getItem(USERS_STORAGE_KEY))||{}; } catch(e) { return {}; } }
    function saveAllUsers(u) { localStorage.setItem(USERS_STORAGE_KEY, JSON.stringify(u)); }
    function hashPassword(p) { return btoa(p+'salt_2025'); }
    function registerUser(u,p) {
      const users = getAllUsers();
      if(users[u]) return {success:false,message:'用户名已存在'};
      users[u]={passwordHash:hashPassword(p),characters:[]};
      saveAllUsers(users);
      return {success:true};
    }
    function loginUser(u,p) {
      const users = getAllUsers();
      const user = users[u];
      if(!user) return {success:false,message:'用户不存在'};
      if(user.passwordHash!==hashPassword(p)) return {success:false,message:'密码错误'};
      sessionStorage.setItem(CURRENT_USER_KEY, u);
      return {success:true};
    }
    function logout() {
      sessionStorage.removeItem(CURRENT_USER_KEY);
      renderAuthArea();
      document.getElementById('mainContent').style.display='none';
    }
    function getCurrentUser() { return sessionStorage.getItem(CURRENT_USER_KEY); }
    function getChars() {
      const u = getCurrentUser();
      if(!u) return [];
      const users = getAllUsers();
      return users[u]?.characters || [];
    }
    function saveChars(chars) {
      const u = getCurrentUser();
      if(!u) return;
      const users = getAllUsers();
      if(users[u]) { users[u].characters = chars; saveAllUsers(users); }
    }
    function norm(c) {
      return {
        id:c.id||'', name:c.name||'',
        whiteBase:c.whiteBase??0, blue:c.blue??0, lastUpdateTimestamp:c.lastUpdateTimestamp||null,
        conquestBase:c.conquestBase??0, conquestLastUpdate:c.conquestLastUpdate||null,
        transcendBase:c.transcendBase??0, transcendLastUpdate:c.transcendLastUpdate||null,
        note:c.note||''
      };
    }
    function genId() { return Date.now().toString(36)+Math.random().toString(36).substring(2,6); }

    // 固定时刻计算
    function countOccurrences(startMs, endMs, hoursArray) {
      if(startMs>=endMs) return 0;
      const start=new Date(startMs), end=new Date(endMs);
      let count=0;
      const cur=new Date(start); cur.setHours(0,0,0,0);
      while(cur<=end) {
        const y=cur.getFullYear(), m=cur.getMonth(), d=cur.getDate();
        for(let h of hoursArray) {
          const pt=new Date(y,m,d,h,0,0,0);
          if(pt>start&&pt<=end) count++;
        }
        cur.setDate(cur.getDate()+1);
      }
      return count;
    }
    function getNextOccurrence(nowMs, hoursArray) {
      const now=new Date(nowMs);
      const today=new Date(now); today.setHours(0,0,0,0);
      for(let h of hoursArray) {
        const pt=new Date(today.getFullYear(),today.getMonth(),today.getDate(),h,0,0,0);
        if(pt>now) return pt;
      }
      const tomorrow=new Date(today); tomorrow.setDate(tomorrow.getDate()+1);
      const fh=Math.min(...hoursArray);
      return new Date(tomorrow.getFullYear(),tomorrow.getMonth(),tomorrow.getDate(),fh,0,0,0);
    }
    function fmtTime(d) { return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
    function computeBySchedule(base, lastUpdate, hoursArray, amount, max) {
      if(!lastUpdate) { const n=getNextOccurrence(Date.now(),hoursArray); return {current:base,nextTime:fmtTime(n)}; }
      const now=Date.now();
      const occ=countOccurrences(lastUpdate,now,hoursArray);
      let val=base+occ*amount; if(val>max) val=max;
      const n=getNextOccurrence(now,hoursArray);
      return {current:val,nextTime:fmtTime(n)};
    }
    function compWhite(c) { return computeBySchedule(c.whiteBase,c.lastUpdateTimestamp,WHITE_HOURS,15,WHITE_MAX); }
    function compConquest(c) { return computeBySchedule(c.conquestBase,c.conquestLastUpdate,CONQUEST_HOURS,1,CONQUEST_MAX); }
    function compTranscend(c) { return computeBySchedule(c.transcendBase,c.transcendLastUpdate,TRANSCEND_HOURS,1,TRANSCEND_MAX); }
    function fmtNum(v) { return (typeof v==='number'&&!isNaN(v))?parseFloat(v.toFixed(4)).toString():'0'; }
    function esc(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    // 操作
    function updateWhite(id,v) {
      const chars=getChars().map(norm); const c=chars.find(x=>x.id===id); if(!c) return;
      let n=parseFloat(v); if(isNaN(n)) n=0;
      c.whiteBase=Math.min(Math.max(n,0),WHITE_MAX); c.lastUpdateTimestamp=Date.now();
      saveChars(chars); renderCharacters();
    }
    function updateBlue(id,v) {
      const chars=getChars().map(norm); const c=chars.find(x=>x.id===id); if(!c) return;
      let n=parseFloat(v); if(isNaN(n)) n=0; c.blue=Math.max(n,0);
      saveChars(chars); renderCharacters();
    }
    function updateConquest(id,v) {
      const chars=getChars().map(norm); const c=chars.find(x=>x.id===id); if(!c) return;
      let n=parseInt(v,10); if(isNaN(n)) n=0;
      c.conquestBase=Math.min(Math.max(n,0),CONQUEST_MAX); c.conquestLastUpdate=Date.now();
      saveChars(chars); renderCharacters();
    }
    function updateTranscend(id,v) {
      const chars=getChars().map(norm); const c=chars.find(x=>x.id===id); if(!c) return;
      let n=parseInt(v,10); if(isNaN(n)) n=0;
      c.transcendBase=Math.min(Math.max(n,0),TRANSCEND_MAX); c.transcendLastUpdate=Date.now();
      saveChars(chars); renderCharacters();
    }
    function resetWhite(id) {
      const chars=getChars().map(norm); const c=chars.find(x=>x.id===id); if(!c) return;
      const {current}=compWhite(c); c.whiteBase=Math.min(current,WHITE_MAX); c.lastUpdateTimestamp=Date.now();
      saveChars(chars); renderCharacters();
    }
    function updateNote(id,note) {
      const chars=getChars().map(norm); const c=chars.find(x=>x.id===id);
      if(c){c.note=note;saveChars(chars);}
    }
    function deleteChar(id) {
      let chars=getChars().map(norm); chars=chars.filter(c=>c.id!==id);
      saveChars(chars); renderCharacters();
    }
    function addChar(name,w,b,conq,trans) {
      if(!name.trim()){alert('请输入角色名字');return;}
      let white=parseFloat(w); if(isNaN(white)) white=0;
      let blue=parseFloat(b); if(isNaN(blue)) blue=0;
      let conquest=parseInt(conq,10); if(isNaN(conquest)) conquest=0;
      let transcend=parseInt(trans,10); if(isNaN(transcend)) transcend=0;
      white=Math.min(Math.max(white,0),WHITE_MAX); blue=Math.max(blue,0);
      conquest=Math.min(Math.max(conquest,0),CONQUEST_MAX);
      transcend=Math.min(Math.max(transcend,0),TRANSCEND_MAX);
      const now=Date.now();
      const chars=getChars().map(norm);
      chars.push({id:genId(),name:name.trim(),whiteBase:white,blue:blue,lastUpdateTimestamp:now,
        conquestBase:conquest,conquestLastUpdate:now,transcendBase:transcend,transcendLastUpdate:now,note:''});
      saveChars(chars); renderCharacters();
      document.getElementById('newCharName').value='';
      document.getElementById('newWhite').value='0';
      document.getElementById('newBlue').value='0';
      document.getElementById('newConquest').value='0';
      document.getElementById('newTranscend').value='0';
    }

    // 拖拽排序
    let draggedId = null;
    function handleDragStart(e) {
      draggedId = e.currentTarget.closest('.character-card').dataset.id;
      e.currentTarget.closest('.character-card').classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', draggedId);
    }
    function handleDragEnd(e) {
      e.currentTarget.closest('.character-card').classList.remove('dragging');
      document.querySelectorAll('.character-card').forEach(c => c.classList.remove('drag-over'));
      draggedId = null;
    }
    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const card = e.currentTarget.closest('.character-card');
      if (card && card.dataset.id !== draggedId) {
        document.querySelectorAll('.character-card').forEach(c => c.classList.remove('drag-over'));
        card.classList.add('drag-over');
      }
    }
    function handleDragLeave(e) {
      const card = e.currentTarget.closest('.character-card');
      if (card) card.classList.remove('drag-over');
    }
    function handleDrop(e) {
      e.preventDefault();
      const card = e.currentTarget.closest('.character-card');
      if (!card) return;
      card.classList.remove('drag-over');
      const targetId = card.dataset.id;
      if (!draggedId || draggedId === targetId) { draggedId = null; return; }
      const chars = getChars().map(norm);
      const fromIdx = chars.findIndex(c => c.id === draggedId);
      const toIdx = chars.findIndex(c => c.id === targetId);
      if (fromIdx === -1 || toIdx === -1) { draggedId = null; return; }
      const [moved] = chars.splice(fromIdx, 1);
      chars.splice(toIdx, 0, moved);
      saveChars(chars);
      renderCharacters();
      draggedId = null;
    }

    function renderCharacters() {
      const chars = getChars().map(norm);
      const container = document.getElementById('charactersContainer');
      const placeholder = document.getElementById('emptyPlaceholder');
      if (!chars.length) { container.innerHTML=''; placeholder.style.display='block'; return; }
      placeholder.style.display='none';
      let html='';
      chars.forEach(c => {
        const w=compWhite(c), conq=compConquest(c), trans=compTranscend(c);
        const wv=w.current, bv=c.blue, cv=conq.current, tv=trans.current;
        const note=c.note||'';
        const wMax=wv>=WHITE_MAX?'maxed-white':'';
        const cMax=cv>=CONQUEST_MAX?'maxed-conquest':'';
        const tMax=tv>=TRANSCEND_MAX?'maxed-transcend':'';
        const wInfo=wv>=WHITE_MAX?'🔸上限':`下次⏱${w.nextTime}`;
        const cInfo=cv>=CONQUEST_MAX?'🔸上限':`下次⏱${conq.nextTime}`;
        const tInfo=tv>=TRANSCEND_MAX?'🔸上限':`下次⏱${trans.nextTime}`;
        html+=`
          <div class="character-card" data-id="${c.id}" draggable="false">
            <div class="card-top-row">
              <span class="drag-handle" title="拖拽排序">⋮⋮</span>
              <span class="char-name-display">${esc(c.name)}</span>
              <button class="remove-char-btn" data-action="remove" data-id="${c.id}">✕</button>
            </div>
            <div class="values-grid">
              <div class="value-block white ${wMax}">
                <div class="value-label">⬜白色</div>
                <div class="value-number">${fmtNum(wv)}</div>
                <input class="edit-value-input" id="white-edit-${c.id}" value="${fmtNum(wv)}" step="any" min="0">
                <button class="apply-edit-btn" data-action="updateWhite" data-id="${c.id}">更新</button>
                <div class="growth-info">${wInfo}</div>
              </div>
              <div class="value-block blue">
                <div class="value-label">🔵蓝色</div>
                <div class="value-number">${fmtNum(bv)}</div>
                <input class="edit-value-input" id="blue-edit-${c.id}" value="${fmtNum(bv)}" step="any" min="0">
                <button class="apply-edit-btn" data-action="updateBlue" data-id="${c.id}">更新</button>
                <div class="growth-info">恒定</div>
              </div>
              <div class="value-block conquest ${cMax}">
                <div class="value-label">⚔️征服</div>
                <div class="value-number">${cv}</div>
                <input class="edit-value-input" id="conquest-edit-${c.id}" value="${cv}" step="1" min="0">
                <button class="apply-edit-btn" data-action="updateConquest" data-id="${c.id}">更新</button>
                <div class="growth-info">${cInfo}</div>
              </div>
              <div class="value-block transcend ${tMax}">
                <div class="value-label">✨超越</div>
                <div class="value-number">${tv}</div>
                <input class="edit-value-input" id="transcend-edit-${c.id}" value="${tv}" step="1" min="0">
                <button class="apply-edit-btn" data-action="updateTranscend" data-id="${c.id}">更新</button>
                <div class="growth-info">${tInfo}</div>
              </div>
            </div>
            <div class="note-field">
              <input type="text" class="char-note-input" data-id="${c.id}" placeholder="✎备注..." value="${esc(note)}">
            </div>
            <div class="card-footer">
              <span>白色计时</span>
              <button class="reset-timer-small" data-action="resetWhite" data-id="${c.id}">↺重置</button>
            </div>
          </div>`;
      });
      container.innerHTML = html;
      bindEvents();
    }

    function bindEvents() {
      // 拖拽事件
      document.querySelectorAll('.drag-handle').forEach(handle => {
        handle.addEventListener('mousedown', (e) => {
          const card = e.currentTarget.closest('.character-card');
          if (card) card.setAttribute('draggable', 'true');
        });
        handle.addEventListener('mouseup', (e) => {
          const card = e.currentTarget.closest('.character-card');
          if (card) card.setAttribute('draggable', 'false');
        });
        // touch事件
        handle.addEventListener('touchstart', (e) => {
          const card = e.currentTarget.closest('.character-card');
          if (card) card.setAttribute('draggable', 'true');
        }, {passive:true});
        handle.addEventListener('touchend', (e) => {
          const card = e.currentTarget.closest('.character-card');
          if (card) card.setAttribute('draggable', 'false');
        });
      });
      document.querySelectorAll('.character-card').forEach(card => {
        card.addEventListener('dragstart', handleDragStart);
        card.addEventListener('dragend', handleDragEnd);
        card.addEventListener('dragover', handleDragOver);
        card.addEventListener('dragleave', handleDragLeave);
        card.addEventListener('drop', handleDrop);
      });
      // 按钮事件
      document.querySelectorAll('.remove-char-btn').forEach(b => b.addEventListener('click', (e) => deleteChar(b.dataset.id)));
      document.querySelectorAll('[data-action="resetWhite"]').forEach(b => b.addEventListener('click', (e) => resetWhite(b.dataset.id)));
      document.querySelectorAll('.char-note-input').forEach(i => i.addEventListener('input', (e) => updateNote(i.dataset.id, i.value)));
      document.querySelectorAll('[data-action="updateWhite"]').forEach(b => {
        b.addEventListener('click', () => { const id=b.dataset.id; updateWhite(id, document.getElementById(`white-edit-${id}`).value); });
      });
      document.querySelectorAll('[data-action="updateBlue"]').forEach(b => {
        b.addEventListener('click', () => { const id=b.dataset.id; updateBlue(id, document.getElementById(`blue-edit-${id}`).value); });
      });
      document.querySelectorAll('[data-action="updateConquest"]').forEach(b => {
        b.addEventListener('click', () => { const id=b.dataset.id; updateConquest(id, document.getElementById(`conquest-edit-${id}`).value); });
      });
      document.querySelectorAll('[data-action="updateTranscend"]').forEach(b => {
        b.addEventListener('click', () => { const id=b.dataset.id; updateTranscend(id, document.getElementById(`transcend-edit-${id}`).value); });
      });
      document.querySelectorAll('.edit-value-input').forEach(i => {
        i.addEventListener('keypress', (e) => {
          if(e.key==='Enter'){ e.preventDefault();
            const id=i.id.split('-').slice(2).join('-');
            if(i.id.startsWith('white-edit')) updateWhite(id,i.value);
            else if(i.id.startsWith('blue-edit')) updateBlue(id,i.value);
            else if(i.id.startsWith('conquest-edit')) updateConquest(id,i.value);
            else if(i.id.startsWith('transcend-edit')) updateTranscend(id,i.value);
          }
        });
      });
    }

    function renderAuthArea() {
      const authArea = document.getElementById('authArea');
      const user = getCurrentUser();
      if(user) {
        authArea.innerHTML = `<div class="user-welcome">👋 欢迎，<strong>${esc(user)}</strong></div><button id="logoutBtn" class="btn-outline">🚪退出</button>`;
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('mainContent').style.display='block';
        renderCharacters();
      } else {
        authArea.innerHTML = `
          <div style="font-weight:600;">🔐 登录或注册</div>
          <div class="auth-form">
            <input type="text" id="authUsername" placeholder="用户名" autocomplete="off">
            <input type="password" id="authPassword" placeholder="密码">
            <button id="loginBtn">登录</button>
            <button id="registerBtn" class="btn-outline">注册</button>
          </div>`;
        document.getElementById('mainContent').style.display='none';
        document.getElementById('loginBtn').addEventListener('click', () => {
          const u=document.getElementById('authUsername').value.trim();
          const p=document.getElementById('authPassword').value;
          if(!u||!p) return alert('请输入用户名和密码');
          const r=loginUser(u,p);
          if(r.success) renderAuthArea(); else alert(r.message);
        });
        document.getElementById('registerBtn').addEventListener('click', () => {
          const u=document.getElementById('authUsername').value.trim();
          const p=document.getElementById('authPassword').value;
          if(!u||!p) return alert('请输入用户名和密码');
          if(p.length<3) return alert('密码至少3位');
          const r=registerUser(u,p);
          alert(r.success?'注册成功，请登录':r.message);
        });
      }
    }

    document.getElementById('addCharacterBtn').addEventListener('click', () => {
      addChar(
        document.getElementById('newCharName').value,
        document.getElementById('newWhite').value,
        document.getElementById('newBlue').value,
        document.getElementById('newConquest').value,
        document.getElementById('newTranscend').value
      );
    });
    ['newCharName','newWhite','newBlue','newConquest','newTranscend'].forEach(id => {
      document.getElementById(id).addEventListener('keypress', e => { if(e.key==='Enter') document.getElementById('addCharacterBtn').click(); });
    });

    setInterval(() => { if(getCurrentUser()) renderCharacters(); }, 60000);
    document.addEventListener('visibilitychange', () => { if(document.visibilityState==='visible'&&getCurrentUser()) renderCharacters(); });
    window.addEventListener('storage', (e) => { if(e.key===USERS_STORAGE_KEY&&getCurrentUser()) renderCharacters(); });

    renderAuthArea();
  })();
</script>
</body>
</html>
