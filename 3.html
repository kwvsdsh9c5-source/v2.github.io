<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, minimum-scale=0.5">
  <title>角色数值面板 · 固定时刻增长</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(145deg, #f5f7fa 0%, #e9edf5 100%);
      font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 12px 8px;
      display: flex;
      justify-content: center;
    }
    .app-container {
      max-width: 1300px;
      width: 100%;
    }
    .auth-card {
      background: white;
      border-radius: 24px;
      padding: 18px 20px;
      margin-bottom: 18px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.04);
      border: 1px solid #e9eef2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .user-welcome {
      font-weight: 600;
      font-size: 1rem;
      color: #0f172a;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .auth-form {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .auth-form input {
      border: 1px solid #dce3eb;
      border-radius: 22px;
      padding: 10px 14px;
      font-size: 0.85rem;
      background: #f8fafc;
      outline: none;
      min-width: 130px;
      width: auto;
    }
    button {
      background: #1e293b;
      border: none;
      color: white;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 24px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid #1e293b;
      box-shadow: 0 4px 10px rgba(15,23,42,0.1);
      white-space: nowrap;
    }
    button:hover {
      background: #0f172a;
    }
    .btn-outline {
      background: white;
      color: #1e293b;
      border: 1px solid #cbd5e1;
      box-shadow: none;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 500;
      color: #1e293b;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    h1 span {
      background: #eef2ff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #4f46e5;
    }
    .add-character-card {
      background: white;
      border-radius: 24px;
      padding: 16px 18px;
      margin-bottom: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.04);
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 12px;
      border: 1px solid #e9eef2;
    }
    .char-input-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 2 1 150px;
    }
    .char-input-group label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #475569;
      margin-left: 4px;
    }
    .char-input-group input {
      border: 1px solid #dce3eb;
      border-radius: 20px;
      padding: 10px 14px;
      font-size: 0.85rem;
      background: #f8fafc;
      outline: none;
    }
    .value-input-row {
      display: flex;
      gap: 8px;
      flex: 3 1 350px;
      flex-wrap: wrap;
    }
    .mini-input {
      flex: 1 1 70px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .mini-input label {
      font-size: 0.6rem;
      font-weight: 700;
      color: #64748b;
      margin-left: 2px;
    }
    .mini-input input {
      border: 1px solid #dce3eb;
      border-radius: 16px;
      padding: 8px 6px;
      font-size: 0.8rem;
      background: white;
      outline: none;
      text-align: center;
    }
    .characters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 10px;
    }
    /* 手机端强制4列 */
    @media (max-width: 700px) {
      .characters-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }
      .character-card {
        padding: 8px 6px 10px;
        gap: 6px;
        border-radius: 18px;
      }
      .character-name {
        font-size: 0.7rem;
        padding: 4px 8px;
      }
      .values-grid {
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .value-block {
        padding: 6px 4px;
        gap: 2px;
        border-radius: 12px;
      }
      .value-label {
        font-size: 0.5rem;
      }
      .value-number {
        font-size: 1rem;
      }
      .edit-value-input {
        font-size: 0.6rem;
        padding: 4px 4px;
        border-radius: 10px;
      }
      .apply-edit-btn {
        font-size: 0.5rem;
        padding: 3px 8px;
      }
      .growth-info {
        font-size: 0.5rem;
      }
      .note-field input {
        font-size: 0.6rem;
        padding: 6px 8px;
        border-radius: 12px;
      }
      .card-time {
        font-size: 0.55rem;
      }
      .reset-timer-small {
        font-size: 0.55rem;
        padding: 3px 8px;
      }
      .remove-char-btn {
        font-size: 0.9rem;
        padding: 3px 6px;
      }
    }
    .character-card {
      background: white;
      border-radius: 24px;
      padding: 14px 14px 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.03);
      border: 1px solid #edf2f7;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .character-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .character-name {
      font-size: 1rem;
      font-weight: 600;
      color: #0f172a;
      background: #f1f5f9;
      padding: 5px 12px;
      border-radius: 20px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .remove-char-btn {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 1rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 16px;
    }
    .remove-char-btn:hover {
      color: #b91c1c;
      background: #fee2e2;
    }
    .values-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .value-block {
      background: #f8fafc;
      border-radius: 16px;
      padding: 8px 6px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 3px;
      transition: all 0.2s ease;
    }
    .value-block.white { background: #f1f5f9; }
    .value-block.blue { background: #eef2ff; }
    .value-block.conquest { background: #fef9e7; }
    .value-block.transcend { background: #f3e8ff; }

    .value-block.maxed-white {
      background: #ffedd5;
      border: 2px solid #f97316;
      box-shadow: 0 0 8px rgba(249, 115, 22, 0.35);
    }
    .value-block.maxed-conquest {
      background: #fef3c7;
      border: 2px solid #d97706;
      box-shadow: 0 0 8px rgba(217, 119, 6, 0.35);
    }
    .value-block.maxed-transcend {
      background: #ede9fe;
      border: 2px solid #8b5cf6;
      box-shadow: 0 0 8px rgba(139, 92, 246, 0.35);
    }

    .value-label {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      color: #475569;
    }
    .value-number {
      font-size: 1.4rem;
      font-weight: 500;
      color: #0f172a;
      line-height: 1.2;
    }
    .edit-value-input {
      width: 100%;
      border: 1px solid #d1d9e6;
      border-radius: 14px;
      padding: 5px 6px;
      font-size: 0.7rem;
      text-align: center;
      margin-top: 2px;
    }
    .apply-edit-btn {
      background: #334155;
      color: white;
      border: none;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.6rem;
      cursor: pointer;
      margin-top: 3px;
      align-self: center;
    }
    .growth-info {
      font-size: 0.55rem;
      color: #475569;
      margin-top: 2px;
      font-weight: 500;
    }
    .note-field input {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 8px 10px;
      font-size: 0.7rem;
    }
    .card-time {
      font-size: 0.65rem;
      color: #64748b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .reset-timer-small {
      background: white;
      border: 1px solid #d1d9e6;
      padding: 3px 10px;
      font-size: 0.6rem;
      border-radius: 14px;
      cursor: pointer;
    }
    .empty-message {
      color: #64748b;
      font-style: italic;
      padding: 20px;
      text-align: center;
      background: #f8fafc;
      border-radius: 28px;
    }
    hr {
      margin: 16px 0 8px;
      border: 0.5px solid #e2e8f0;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div id="authArea" class="auth-card"></div>

  <div id="mainContent" style="display: none;">
    <h1>
      🎭 角色数值面板
      <span>固定时刻增长</span>
    </h1>

    <div class="add-character-card">
      <div class="char-input-group">
        <label>🧑 角色名字</label>
        <input type="text" id="newCharName" placeholder="例如: 战士·阿尔法" autocomplete="off">
      </div>
      <div class="value-input-row">
        <div class="mini-input"><label>⬜ 白色</label><input type="number" id="newWhite" value="0" step="any" min="0"></div>
        <div class="mini-input"><label>🔵 蓝色</label><input type="number" id="newBlue" value="0" step="any" min="0"></div>
        <div class="mini-input"><label>⚔️ 征服</label><input type="number" id="newConquest" value="0" step="1" min="0"></div>
        <div class="mini-input"><label>✨ 超越</label><input type="number" id="newTranscend" value="0" step="1" min="0"></div>
      </div>
      <button id="addCharacterBtn">+ 添加角色</button>
    </div>

    <div id="charactersContainer" class="characters-grid"></div>
    <div id="emptyPlaceholder" class="empty-message" style="display: none;">
      ✨ 还没有角色，在上方输入名字和数值开始登记吧。
    </div>
    <hr>
    <div style="font-size:0.7rem; color:#64748b; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px;">
      <span>⬜ 白: 02/05/08/11/14/17/20/23 +15 (840满)</span>
      <span>⚔️ 征服: 05/13/21 +1 (21满)</span>
      <span>✨ 超越: 05/17 +1 (14满)</span>
    </div>
  </div>
</div>

<script>
  (function() {
    const USERS_STORAGE_KEY = 'app_users_db_v4';
    const CURRENT_USER_KEY = 'current_user';

    const WHITE_HOURS = [2,5,8,11,14,17,20,23];
    const CONQUEST_HOURS = [5,13,21];
    const TRANSCEND_HOURS = [5,17];

    const WHITE_MAX = 840;
    const CONQUEST_MAX = 21;
    const TRANSCEND_MAX = 14;

    function getAllUsers() {
      try { return JSON.parse(localStorage.getItem(USERS_STORAGE_KEY)) || {}; } catch (e) { return {}; }
    }
    function saveAllUsers(users) { localStorage.setItem(USERS_STORAGE_KEY, JSON.stringify(users)); }
    function hashPassword(pw) { return btoa(pw + 'salt_2025'); }

    function registerUser(username, password) {
      const users = getAllUsers();
      if (users[username]) return { success: false, message: '用户名已存在' };
      users[username] = { passwordHash: hashPassword(password), characters: [] };
      saveAllUsers(users);
      return { success: true };
    }
    function loginUser(username, password) {
      const users = getAllUsers();
      const user = users[username];
      if (!user) return { success: false, message: '用户不存在' };
      if (user.passwordHash !== hashPassword(password)) return { success: false, message: '密码错误' };
      sessionStorage.setItem(CURRENT_USER_KEY, username);
      return { success: true };
    }
    function logout() {
      sessionStorage.removeItem(CURRENT_USER_KEY);
      renderAuthArea();
      document.getElementById('mainContent').style.display = 'none';
    }
    function getCurrentUser() { return sessionStorage.getItem(CURRENT_USER_KEY); }

    function getCurrentUserCharacters() {
      const username = getCurrentUser();
      if (!username) return [];
      const users = getAllUsers();
      return users[username]?.characters || [];
    }
    function saveCurrentUserCharacters(characters) {
      const username = getCurrentUser();
      if (!username) return;
      const users = getAllUsers();
      if (users[username]) {
        users[username].characters = characters;
        saveAllUsers(users);
      }
    }

    function normalizeCharacter(char) {
      return {
        id: char.id || '',
        name: char.name || '',
        whiteBase: char.whiteBase ?? 0,
        blue: char.blue ?? 0,
        lastUpdateTimestamp: char.lastUpdateTimestamp || null,
        conquestBase: char.conquestBase ?? 0,
        conquestLastUpdate: char.conquestLastUpdate || null,
        transcendBase: char.transcendBase ?? 0,
        transcendLastUpdate: char.transcendLastUpdate || null,
        note: char.note || ''
      };
    }

    function generateId() { return Date.now().toString(36) + Math.random().toString(36).substring(2, 6); }

    function countOccurrences(startMs, endMs, hoursArray) {
      if (startMs >= endMs) return 0;
      const start = new Date(startMs);
      const end = new Date(endMs);
      let count = 0;
      const current = new Date(start);
      current.setHours(0,0,0,0);
      while (current <= end) {
        const year = current.getFullYear();
        const month = current.getMonth();
        const date = current.getDate();
        for (let h of hoursArray) {
          const point = new Date(year, month, date, h, 0, 0, 0);
          if (point > start && point <= end) count++;
        }
        current.setDate(current.getDate() + 1);
      }
      return count;
    }

    function getNextOccurrence(nowMs, hoursArray) {
      const now = new Date(nowMs);
      const today = new Date(now);
      today.setHours(0,0,0,0);
      for (let h of hoursArray) {
        const point = new Date(today.getFullYear(), today.getMonth(), today.getDate(), h, 0, 0, 0);
        if (point > now) return point;
      }
      const tomorrow = new Date(today);
      tomorrow.setDate(tomorrow.getDate() + 1);
      const firstHour = Math.min(...hoursArray);
      return new Date(tomorrow.getFullYear(), tomorrow.getMonth(), tomorrow.getDate(), firstHour, 0, 0, 0);
    }

    function formatTime(date) {
      return `${String(date.getHours()).padStart(2,'0')}:${String(date.getMinutes()).padStart(2,'0')}`;
    }

    function computeBySchedule(base, lastUpdate, hoursArray, amount, max) {
      if (!lastUpdate) {
        const next = getNextOccurrence(Date.now(), hoursArray);
        return { current: base, nextTime: formatTime(next) };
      }
      const now = Date.now();
      const occ = countOccurrences(lastUpdate, now, hoursArray);
      let val = base + occ * amount;
      if (val > max) val = max;
      const next = getNextOccurrence(now, hoursArray);
      return { current: val, nextTime: formatTime(next) };
    }

    function computeWhite(char) { return computeBySchedule(char.whiteBase, char.lastUpdateTimestamp, WHITE_HOURS, 15, WHITE_MAX); }
    function computeConquest(char) { return computeBySchedule(char.conquestBase, char.conquestLastUpdate, CONQUEST_HOURS, 1, CONQUEST_MAX); }
    function computeTranscend(char) { return computeBySchedule(char.transcendBase, char.transcendLastUpdate, TRANSCEND_HOURS, 1, TRANSCEND_MAX); }

    function fmtNum(val) { return (typeof val === 'number' && !isNaN(val)) ? parseFloat(val.toFixed(4)).toString() : '0'; }
    function escapeHtml(t) { return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function updateWhite(id, newVal) {
      const chars = getCurrentUserCharacters().map(normalizeCharacter);
      const c = chars.find(x => x.id === id);
      if (!c) return;
      let v = parseFloat(newVal); if (isNaN(v)) v = 0;
      c.whiteBase = Math.min(Math.max(v, 0), WHITE_MAX);
      c.lastUpdateTimestamp = Date.now();
      saveCurrentUserCharacters(chars);
      renderCharacters();
    }
    function updateBlue(id, newVal) {
      const chars = getCurrentUserCharacters().map(normalizeCharacter);
      const c = chars.find(x => x.id === id);
      if (!c) return;
      let v = parseFloat(newVal); if (isNaN(v)) v = 0;
      c.blue = Math.max(v, 0);
      saveCurrentUserCharacters(chars);
      renderCharacters();
    }
    function updateConquest(id, newVal) {
      const chars = getCurrentUserCharacters().map(normalizeCharacter);
      const c = chars.find(x => x.id === id);
      if (!c) return;
      let v = parseInt(newVal, 10); if (isNaN(v)) v = 0;
      c.conquestBase = Math.min(Math.max(v, 0), CONQUEST_MAX);
      c.conquestLastUpdate = Date.now();
      saveCurrentUserCharacters(chars);
      renderCharacters();
    }
    function updateTranscend(id, newVal) {
      const chars = getCurrentUserCharacters().map(normalizeCharacter);
      const c = chars.find(x => x.id === id);
      if (!c) return;
      let v = parseInt(newVal, 10); if (isNaN(v)) v = 0;
      c.transcendBase = Math.min(Math.max(v, 0), TRANSCEND_MAX);
      c.transcendLastUpdate = Date.now();
      saveCurrentUserCharacters(chars);
      renderCharacters();
    }
    function resetWhiteTimer(id) {
      const chars = getCurrentUserCharacters().map(normalizeCharacter);
      const c = chars.find(x => x.id === id);
      if (!c) return;
      const { current } = computeWhite(c);
      c.whiteBase = Math.min(current, WHITE_MAX);
      c.lastUpdateTimestamp = Date.now();
      saveCurrentUserCharacters(chars);
      renderCharacters();
    }
    function updateNote(id, note) {
      const chars = getCurrentUserCharacters().map(normalizeCharacter);
      const c = chars.find(x => x.id === id);
      if (c) { c.note = note; saveCurrentUserCharacters(chars); }
    }
    function deleteCharacter(id) {
      let chars = getCurrentUserCharacters().map(normalizeCharacter);
      chars = chars.filter(c => c.id !== id);
      saveCurrentUserCharacters(chars);
      renderCharacters();
    }
    function addCharacter(name, w, b, conq, trans) {
      if (!name.trim()) { alert('请输入角色名字'); return; }
      let white = parseFloat(w); if (isNaN(white)) white = 0;
      let blue = parseFloat(b); if (isNaN(blue)) blue = 0;
      let conquest = parseInt(conq,10); if (isNaN(conquest)) conquest = 0;
      let transcend = parseInt(trans,10); if (isNaN(transcend)) transcend = 0;
      white = Math.min(Math.max(white,0), WHITE_MAX);
      blue = Math.max(blue,0);
      conquest = Math.min(Math.max(conquest,0), CONQUEST_MAX);
      transcend = Math.min(Math.max(transcend,0), TRANSCEND_MAX);
      const now = Date.now();
      const chars = getCurrentUserCharacters().map(normalizeCharacter);
      chars.push({
        id: generateId(), name: name.trim(),
        whiteBase: white, blue: blue, lastUpdateTimestamp: now,
        conquestBase: conquest, conquestLastUpdate: now,
        transcendBase: transcend, transcendLastUpdate: now,
        note: ''
      });
      saveCurrentUserCharacters(chars);
      renderCharacters();
      document.getElementById('newCharName').value = '';
      document.getElementById('newWhite').value = '0';
      document.getElementById('newBlue').value = '0';
      document.getElementById('newConquest').value = '0';
      document.getElementById('newTranscend').value = '0';
    }

    function renderCharacters() {
      const chars = getCurrentUserCharacters().map(normalizeCharacter);
      const container = document.getElementById('charactersContainer');
      const placeholder = document.getElementById('emptyPlaceholder');
      if (!chars.length) { container.innerHTML = ''; placeholder.style.display = 'block'; return; }
      placeholder.style.display = 'none';
      let html = '';
      chars.forEach(c => {
        const w = computeWhite(c);
        const conq = computeConquest(c);
        const trans = computeTranscend(c);
        const whiteVal = w.current, blueVal = c.blue, conqVal = conq.current, transVal = trans.current;
        const note = c.note || '';

        const whiteMaxClass = whiteVal >= WHITE_MAX ? 'maxed-white' : '';
        const conquestMaxClass = conqVal >= CONQUEST_MAX ? 'maxed-conquest' : '';
        const transcendMaxClass = transVal >= TRANSCEND_MAX ? 'maxed-transcend' : '';

        const whiteInfo = whiteVal >= WHITE_MAX ? '🔸上限' : `下次 ⏱${w.nextTime}`;
        const conquestInfo = conqVal >= CONQUEST_MAX ? '🔸上限' : `下次 ⏱${conq.nextTime}`;
        const transcendInfo = transVal >= TRANSCEND_MAX ? '🔸上限' : `下次 ⏱${trans.nextTime}`;

        html += `
          <div class="character-card" data-id="${c.id}">
            <div class="character-header">
              <div class="character-name">👤 ${escapeHtml(c.name)}</div>
              <button class="remove-char-btn" data-action="remove" data-id="${c.id}">✕</button>
            </div>
            <div class="values-grid">
              <div class="value-block white ${whiteMaxClass}">
                <div class="value-label">⬜白</div>
                <div class="value-number">${fmtNum(whiteVal)}</div>
                <input class="edit-value-input" id="white-edit-${c.id}" value="${fmtNum(whiteVal)}" step="any" min="0">
                <button class="apply-edit-btn" data-action="updateWhite" data-id="${c.id}">更新</button>
                <div class="growth-info">${whiteInfo}</div>
              </div>
              <div class="value-block blue">
                <div class="value-label">🔵蓝</div>
                <div class="value-number">${fmtNum(blueVal)}</div>
                <input class="edit-value-input" id="blue-edit-${c.id}" value="${fmtNum(blueVal)}" step="any" min="0">
                <button class="apply-edit-btn" data-action="updateBlue" data-id="${c.id}">更新</button>
                <div class="growth-info">恒定</div>
              </div>
              <div class="value-block conquest ${conquestMaxClass}">
                <div class="value-label">⚔️征服</div>
                <div class="value-number">${conqVal}</div>
                <input class="edit-value-input" id="conquest-edit-${c.id}" value="${conqVal}" step="1" min="0">
                <button class="apply-edit-btn" data-action="updateConquest" data-id="${c.id}">更新</button>
                <div class="growth-info">${conquestInfo}</div>
              </div>
              <div class="value-block transcend ${transcendMaxClass}">
                <div class="value-label">✨超越</div>
                <div class="value-number">${transVal}</div>
                <input class="edit-value-input" id="transcend-edit-${c.id}" value="${transVal}" step="1" min="0">
                <button class="apply-edit-btn" data-action="updateTranscend" data-id="${c.id}">更新</button>
                <div class="growth-info">${transcendInfo}</div>
              </div>
            </div>
            <div class="note-field">
              <input type="text" class="char-note-input" data-id="${c.id}" placeholder="✎ 备注..." value="${escapeHtml(note)}">
            </div>
            <div class="card-time">
              <span>🔄 白色重置</span>
              <button class="reset-timer-small" data-action="resetWhite" data-id="${c.id}">↺</button>
            </div>
          </div>`;
      });
      container.innerHTML = html;
      bindEvents();
    }

    function bindEvents() {
      document.querySelectorAll('.remove-char-btn').forEach(b => b.addEventListener('click', (e) => deleteCharacter(b.dataset.id)));
      document.querySelectorAll('[data-action="resetWhite"]').forEach(b => b.addEventListener('click', (e) => resetWhiteTimer(b.dataset.id)));
      document.querySelectorAll('.char-note-input').forEach(i => i.addEventListener('input', (e) => updateNote(i.dataset.id, i.value)));
      document.querySelectorAll('[data-action="updateWhite"]').forEach(b => {
        b.addEventListener('click', () => {
          const id = b.dataset.id;
          updateWhite(id, document.getElementById(`white-edit-${id}`).value);
        });
      });
      document.querySelectorAll('[data-action="updateBlue"]').forEach(b => {
        b.addEventListener('click', () => {
          const id = b.dataset.id;
          updateBlue(id, document.getElementById(`blue-edit-${id}`).value);
        });
      });
      document.querySelectorAll('[data-action="updateConquest"]').forEach(b => {
        b.addEventListener('click', () => {
          const id = b.dataset.id;
          updateConquest(id, document.getElementById(`conquest-edit-${id}`).value);
        });
      });
      document.querySelectorAll('[data-action="updateTranscend"]').forEach(b => {
        b.addEventListener('click', () => {
          const id = b.dataset.id;
          updateTranscend(id, document.getElementById(`transcend-edit-${id}`).value);
        });
      });
      document.querySelectorAll('.edit-value-input').forEach(i => {
        i.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            const id = i.id.split('-').slice(2).join('-'); 
            if (i.id.startsWith('white-edit')) updateWhite(id, i.value);
            else if (i.id.startsWith('blue-edit')) updateBlue(id, i.value);
            else if (i.id.startsWith('conquest-edit')) updateConquest(id, i.value);
            else if (i.id.startsWith('transcend-edit')) updateTranscend(id, i.value);
          }
        });
      });
    }

    function renderAuthArea() {
      const authArea = document.getElementById('authArea');
      const user = getCurrentUser();
      if (user) {
        authArea.innerHTML = `<div class="user-welcome">👋 欢迎，<strong>${escapeHtml(user)}</strong></div><button id="logoutBtn" class="btn-outline">🚪 退出</button>`;
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('mainContent').style.display = 'block';
        renderCharacters();
      } else {
        authArea.innerHTML = `
          <div style="font-weight:600;">🔐 登录或注册</div>
          <div class="auth-form">
            <input type="text" id="authUsername" placeholder="用户名" autocomplete="off">
            <input type="password" id="authPassword" placeholder="密码">
            <button id="loginBtn">登录</button>
            <button id="registerBtn" class="btn-outline">注册</button>
          </div>`;
        document.getElementById('mainContent').style.display = 'none';
        document.getElementById('loginBtn').addEventListener('click', () => {
          const u = document.getElementById('authUsername').value.trim();
          const p = document.getElementById('authPassword').value;
          if(!u||!p) return alert('请输入用户名和密码');
          const r = loginUser(u,p);
          if(r.success) renderAuthArea(); else alert(r.message);
        });
        document.getElementById('registerBtn').addEventListener('click', () => {
          const u = document.getElementById('authUsername').value.trim();
          const p = document.getElementById('authPassword').value;
          if(!u||!p) return alert('请输入用户名和密码');
          if(p.length<3) return alert('密码至少3位');
          const r = registerUser(u,p);
          alert(r.success ? '注册成功，请登录' : r.message);
        });
      }
    }

    document.getElementById('addCharacterBtn').addEventListener('click', () => {
      addCharacter(
        document.getElementById('newCharName').value,
        document.getElementById('newWhite').value,
        document.getElementById('newBlue').value,
        document.getElementById('newConquest').value,
        document.getElementById('newTranscend').value
      );
    });
    ['newCharName','newWhite','newBlue','newConquest','newTranscend'].forEach(id => {
      document.getElementById(id).addEventListener('keypress', e => { if(e.key==='Enter') document.getElementById('addCharacterBtn').click(); });
    });

    setInterval(() => { if(getCurrentUser()) renderCharacters(); }, 60000);
    document.addEventListener('visibilitychange', () => { if(document.visibilityState==='visible' && getCurrentUser()) renderCharacters(); });
    window.addEventListener('storage', (e) => { if(e.key===USERS_STORAGE_KEY && getCurrentUser()) renderCharacters(); });

    renderAuthArea();
  })();
</script>
</body>
</html>
